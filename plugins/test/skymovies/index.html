<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyMoviesHD - Umbrella Plugin</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            text-align: center;
        }

        h1 {
            color: #feca57;
        }

        .plugin-card {
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .install-btn {
            display: inline-block;
            background: #feca57;
            color: #1a1a2e;
            padding: 15px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .install-btn:hover {
            background: #f0b823;
        }

        .info {
            color: #888;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <h1>🌟 SkyMoviesHD Plugin</h1>
    <div class="plugin-card">
        <h2>Bollywood, Hollywood & South Indian</h2>
        <p>Browse and download Bollywood, Hollywood, and South Indian movies from SkyMoviesHD</p>
        <p><strong>Features:</strong> Search, Categories, Dual Audio, Multi-quality downloads</p>
        <a class="install-btn" href="umbrella://YOUR_LOCAL_IP:5500/plugins/test/skymovies/manifest.json">
            📥 Install Plugin
        </a>
        <p class="info">Opens in Umbrella app. Make sure the app is installed.</p>
    </div>
</body>

</html>
