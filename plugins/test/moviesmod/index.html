<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoviesMod - Umbrella Plugin</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #0a1628;
            color: #eee;
            text-align: center;
        }

        h1 {
            color: #ff6b35;
        }

        .plugin-card {
            background: #1a2744;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .install-btn {
            display: inline-block;
            background: #ff6b35;
            color: white;
            padding: 15px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .install-btn:hover {
            background: #e5592e;
        }

        .info {
            color: #888;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <h1>🎥 MoviesMod Plugin</h1>
    <div class="plugin-card">
        <h2>Movies & TV Shows</h2>
        <p>Browse, search, and download movies & TV shows from MoviesMod</p>
        <p><strong>Features:</strong> Search, Categories, Quality-organized downloads (480p/720p/1080p)</p>
        <a class="install-btn" href="umbrella://YOUR_LOCAL_IP:5500/test/moviesmod/manifest.json">
            📥 Install Plugin
        </a>
        <p class="info">Opens in Umbrella app. Make sure the app is installed.</p>
    </div>
</body>

</html>
